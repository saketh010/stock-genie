name: Manual Trade Execution

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Required to push the updated paper_portfolio.json back to the repo

jobs:
  execute-trades:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Multi-Agent Trading Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python main.py

      - name: Commit and Push Updated Portfolio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add paper_portfolio.json
          git commit -m "Auto-update portfolio state after trades [skip ci]" || echo "No changes to commit"
          git push
